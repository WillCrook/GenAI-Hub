<script>
const phrases = [
    "my coursework.",
    "my assignments.",
    "revision and exam preparation.",
    "engineering projects.",
    "research and literature reviews.",
    "writing reports more efficiently.",
    "data analysis and visualisation.",
    "improving my productivity.",
    "creating presentations.",
    "developing workplace skills.",
    "job applications and CVs.",
    "preparing for interviews.",
    "learning new technologies.",
    "solving complex problems.",
    "collaborating with others.",
    "boosting my employability.",
    "academic success.",
    "lifelong learning."
];

const element = document.getElementById("rotating-text");

let phraseIndex = 0;
let charIndex = 0;
let deleting = false;

function typeEffect() {
    const currentPhrase = phrases[phraseIndex];

    if (!deleting) {
        element.textContent = currentPhrase.substring(0, charIndex + 1);
        charIndex++;

        if (charIndex === currentPhrase.length) {
            deleting = true;
            setTimeout(typeEffect, 1800);
            return;
        }

        setTimeout(typeEffect, 60);
    } else {
        element.textContent = currentPhrase.substring(0, charIndex - 1);
        charIndex--;

        if (charIndex === 0) {
            deleting = false;
            phraseIndex = (phraseIndex + 1) % phrases.length;
        }

        setTimeout(typeEffect, 30);
    }
}

typeEffect();


const style = document.createElement('style');

style.textContent = `

#bulb {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:7rem;

    filter:none;
    opacity:0.4;

    animation:
        bulbCycle 8s infinite,
        float 6s ease-in-out infinite;
}

@keyframes bulbCycle {

    0% {
        opacity:0.15;
        filter:none;
    }

    8% {
        opacity:0.15;
        filter:none;
    }

    12% {
        opacity:1;
        filter:
            drop-shadow(0 0 15px rgba(255,255,0,0.8))
            drop-shadow(0 0 40px rgba(255,255,0,0.5));
    }

    18% {
        opacity:0.2;
        filter:none;
    }

    24% {
        opacity:1;
        filter:
            drop-shadow(0 0 20px rgba(255,255,0,0.9))
            drop-shadow(0 0 50px rgba(255,255,0,0.6));
    }

    32% {
        opacity:0.25;
        filter:none;
    }

    42% {
        opacity:1;
        filter:
            drop-shadow(0 0 25px rgba(255,255,0,1))
            drop-shadow(0 0 70px rgba(255,255,0,0.7));
    }

    70% {
        opacity:1;
        filter:
            drop-shadow(0 0 25px rgba(255,255,0,1))
            drop-shadow(0 0 70px rgba(255,255,0,0.7));
    }

    85% {
        opacity:0.3;
        filter:none;
    }

    100% {
        opacity:0.15;
        filter:none;
    }
}

@keyframes float {
    0%,100% { transform:translate(-50%,-50%) translateY(0); }
    50% { transform:translate(-50%,-50%) translateY(-12px); }
}

`;

document.head.appendChild(style);

</script>
